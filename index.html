<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI科技园区 - 企业数字化与AI升级解决方案</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080f;--surface:#0d1117;--card:#151b28;--border:#21293a;--text:#e6edf3;--dim:#8b949e;--muted:#484f58}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* Hero */
.hero{position:relative;padding:80px 20px 60px;text-align:center;overflow:hidden}
.hero::before{content:'';position:absolute;top:-120px;left:50%;transform:translateX(-50%);width:800px;height:500px;background:radial-gradient(ellipse,rgba(56,189,248,.08) 0%,rgba(139,92,246,.05) 40%,transparent 70%);pointer-events:none}
.hero-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:100px;background:rgba(56,189,248,.08);border:1px solid rgba(56,189,248,.15);color:#38bdf8;font-size:12px;font-weight:600;letter-spacing:.5px;margin-bottom:24px;text-transform:uppercase}
.hero h1{font-size:clamp(32px,5vw,52px);font-weight:800;letter-spacing:-.02em;line-height:1.15;margin-bottom:16px;background:linear-gradient(135deg,#f0f6fc 0%,#38bdf8 50%,#a78bfa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:clamp(15px,2vw,18px);color:var(--dim);max-width:640px;margin:0 auto;line-height:1.7}

/* Stats strip */
.stats-strip{display:flex;justify-content:center;gap:1px;margin:0 auto 60px;max-width:800px;background:var(--border);border-radius:16px;overflow:hidden}
.stat-cell{flex:1;background:var(--surface);padding:28px 16px;text-align:center;transition:background .3s}
.stat-cell:first-child{border-radius:16px 0 0 16px}
.stat-cell:last-child{border-radius:0 16px 16px 0}
.stat-cell:hover{background:var(--card)}
.stat-num{font-size:clamp(28px,4vw,40px);font-weight:800;letter-spacing:-.02em;background:linear-gradient(135deg,#38bdf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-desc{font-size:12px;color:var(--muted);margin-top:6px;font-weight:500;letter-spacing:.3px;text-transform:uppercase}

/* Section title */
.section-head{max-width:1200px;margin:0 auto 32px;padding:0 24px;display:flex;align-items:baseline;gap:16px}
.section-head h2{font-size:22px;font-weight:700;letter-spacing:-.01em}
.section-head .line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

/* Grid */
.grid-wrap{max-width:1200px;margin:0 auto;padding:0 24px 80px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:20px}

/* Card */
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:0;transition:all .35s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden;display:flex;flex-direction:column}
.card:hover{transform:translateY(-4px);border-color:var(--c);box-shadow:0 0 0 1px var(--c),0 20px 50px -12px rgba(0,0,0,.5)}
.card-accent{height:3px;background:linear-gradient(90deg,var(--c),transparent);opacity:.8}
.card-body{padding:28px 24px 20px;flex:1}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px}
.card-icon{width:44px;height:44px;border-radius:12px;background:color-mix(in srgb,var(--c) 12%,transparent);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.card-level{display:flex;gap:2px}
.card-level span{width:16px;height:4px;border-radius:2px;background:var(--border)}
.card-level span.on{background:var(--c)}
.card-name{font-size:20px;font-weight:700;letter-spacing:-.01em;margin-bottom:4px}
.card-ind{font-size:13px;color:var(--dim);margin-bottom:18px;display:flex;align-items:center;gap:6px}
.card-ind::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--c);flex-shrink:0}

/* Progress */
.progress-row{margin-bottom:20px}
.progress-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:6px;font-weight:600;letter-spacing:.3px;text-transform:uppercase}
.progress-track{height:6px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden}
.progress-bar{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--c),color-mix(in srgb,var(--c) 60%,#a78bfa));transition:width 1.2s cubic-bezier(.4,0,.2,1)}

/* Links */
.card-actions{padding:0 24px 24px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.card-actions a{display:flex;align-items:center;justify-content:center;gap:5px;padding:10px 8px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid var(--border);color:var(--dim);text-decoration:none;font-size:12px;font-weight:600;transition:all .25s;white-space:nowrap}
.card-actions a:hover{background:color-mix(in srgb,var(--c) 10%,transparent);border-color:var(--c);color:var(--c)}
.card-actions a svg{width:14px;height:14px;flex-shrink:0}

/* Footer */
.footer{text-align:center;padding:40px 20px;border-top:1px solid var(--border);color:var(--muted);font-size:12px;letter-spacing:.2px}

/* Responsive */
@media(max-width:768px){
  .hero{padding:60px 20px 40px}
  .stats-strip{flex-wrap:wrap;border-radius:12px}
  .stat-cell{min-width:45%;border-radius:0!important}
  .stat-cell:first-child{border-radius:12px 0 0 0!important}
  .stat-cell:nth-child(2){border-radius:0 12px 0 0!important}
  .stat-cell:nth-child(3){border-radius:0 0 0 12px!important}
  .stat-cell:last-child{border-radius:0 0 12px 0!important}
  .grid{grid-template-columns:1fr}
  .section-head{padding:0 16px}
  .grid-wrap{padding:0 16px 60px}
}

/* Entrance animation */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeUp .6s cubic-bezier(.4,0,.2,1) both}
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">🏢 AI科技园区 · 企业数智化平台</div>
  <h1>11家企业 × 3份独立内容<br>33份专属报告与演示</h1>
  <p>每家企业均拥有独立的全球行业趋势分析报告、数字化与AI升级定制方案、以及可交互解决方案演示Demo，点击即可在线浏览。</p>
</div>

<div class="stats-strip">
  <div class="stat-cell"><div class="stat-num">11</div><div class="stat-desc">覆盖企业</div></div>
  <div class="stat-cell"><div class="stat-num">9</div><div class="stat-desc">行业领域</div></div>
  <div class="stat-cell"><div class="stat-num">33</div><div class="stat-desc">独立文件</div></div>
  <div class="stat-cell"><div class="stat-num">33</div><div class="stat-desc">AI升级方案</div></div>
</div>

<div class="section-head">
  <h2>企业矩阵</h2>
  <div class="line"></div>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<div class="footer">© 2026 AI科技园区 · 由钉钉悟空AI生成 · 数据截至2026年6月</div>

<script>
const data=[
  {id:"najin",name:"纳金控股",industry:"供应链管理",level:3,color:"#3b82f6",icon:"🔗"},
  {id:"lanlian",name:"蓝链集团",industry:"冷链供应链",level:3,color:"#06b6d4",icon:"❄️"},
  {id:"kangchu",name:"康储科技",industry:"细胞培养基",level:2,color:"#8b5cf6",icon:"🧬"},
  {id:"yuexin",name:"粤芯半导体",industry:"晶圆代工",level:5,color:"#ef4444",icon:"💎"},
  {id:"weishun",name:"伟顺钢铁",industry:"钢铁贸易",level:1,color:"#f59e0b",icon:"⚙️"},
  {id:"feite",name:"飞特建设",industry:"工厂维保",level:2,color:"#10b981",icon:"🏗️"},
  {id:"zhongen",name:"中恩工程",industry:"市政设计",level:3,color:"#ec4899",icon:"📐"},
  {id:"dawan",name:"大湾冷链",industry:"冷链仓储",level:2,color:"#14b8a6",icon:"📦"},
  {id:"huade",name:"华德工业",industry:"蒸发冷却空调",level:4,color:"#6366f1",icon:"🌀"},
  {id:"langsheng",name:"朗圣药业",industry:"生殖健康药物",level:3,color:"#f43f5e",icon:"💊"},
  {id:"yinxun",name:"银迅信息",industry:"金融科技",level:4,color:"#0ea5e9",icon:"💳"}
];

const icons={
  report:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>',
  solution:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 1 7 7c0 2.38-1.19 4.47-3 5.74V17a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1v-2.26C6.19 13.47 5 11.38 5 9a7 7 0 0 1 7-7z"/></svg>',
  demo:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>'
};

const g=document.getElementById("grid");
data.forEach((e,i)=>{
  const pct=e.level/5*100;
  const levels=Array.from({length:5},(_, j)=>`<span class="${j<e.level?'on':''}"></span>`).join('');
  const d=document.createElement("div");
  d.className="card";
  d.style.setProperty("--c",e.color);
  d.style.animationDelay=`${i*0.06}s`;
  d.innerHTML=`
    <div class="card-accent"></div>
    <div class="card-body">
      <div class="card-top">
        <div class="card-icon">${e.icon}</div>
        <div class="card-level">${levels}</div>
      </div>
      <div class="card-name">${e.name}</div>
      <div class="card-ind">${e.industry}</div>
      <div class="progress-row">
        <div class="progress-meta"><span>数字化成熟度</span><span>${e.level} / 5</span></div>
        <div class="progress-track"><div class="progress-bar" style="width:0%" data-w="${pct}%"></div></div>
      </div>
    </div>
    <div class="card-actions">
      <a href="${e.id}-report.html">${icons.report}行业报告</a>
      <a href="${e.id}-solution.html">${icons.solution}升级方案</a>
      <a href="${e.id}-demo.html">${icons.demo}交互演示</a>
    </div>`;
  g.appendChild(d);
});

// Animate progress bars on load
requestAnimationFrame(()=>{
  setTimeout(()=>{
    document.querySelectorAll('.progress-bar').forEach(el=>{el.style.width=el.dataset.w});
  },300);
});
</script>
</body>
</html>
