<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI科技园区企业数字化与AI升级解决方案演示</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--card:#131829;--card-hover:#1a2035;--accent:#3b82f6;--accent2:#06b6d4;--accent3:#8b5cf6;--text:#e2e8f0;--text-dim:#94a3b8;--border:#1e293b;--success:#10b981;--warning:#f59e0b}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.app{display:flex;min-height:100vh}
.sidebar{width:280px;background:var(--card);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0;overflow-y:auto;position:fixed;height:100vh;z-index:10}
.sidebar h1{font-size:16px;padding:0 20px 20px;border-bottom:1px solid var(--border);margin-bottom:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700;line-height:1.4}
.nav-item{padding:12px 20px;cursor:pointer;transition:all .3s;border-left:3px solid transparent;display:flex;align-items:center;gap:10px;font-size:14px;color:var(--text-dim)}
.nav-item:hover{background:var(--card-hover);color:var(--text)}
.nav-item.active{border-left-color:var(--accent);background:linear-gradient(90deg,rgba(59,130,246,.1),transparent);color:var(--text)}
.nav-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.nav-overview{font-weight:600;margin-bottom:5px}
.main{margin-left:280px;flex:1;padding:30px;max-width:calc(100vw - 280px)}
.overview-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:20px;margin-top:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;transition:transform .3s,box-shadow .3s}
.stat-card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(59,130,246,.15)}
.stat-card h3{font-size:14px;color:var(--text-dim);margin-bottom:8px}
.stat-card .value{font-size:32px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.chart-container{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-top:20px}
.chart-title{font-size:18px;font-weight:600;margin-bottom:20px}
.bar-chart{display:flex;flex-direction:column;gap:12px}
.bar-row{display:flex;align-items:center;gap:12px}
.bar-label{width:100px;font-size:13px;text-align:right;flex-shrink:0;color:var(--text-dim)}
.bar-track{flex:1;height:28px;background:rgba(255,255,255,.05);border-radius:14px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:14px;transition:width 1.5s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;padding-left:12px;font-size:12px;font-weight:600;min-width:fit-content}
.enterprise-view{display:none;animation:fadeIn .5s ease}
.enterprise-view.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.header-section{margin-bottom:30px}
.header-section h2{font-size:28px;font-weight:700;margin-bottom:8px}
.tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-right:8px}
.tag-industry{background:rgba(59,130,246,.2);color:var(--accent)}
.tag-level{background:rgba(16,185,129,.2);color:var(--success)}
.solutions-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin:24px 0}
.solution-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;transition:all .3s;position:relative;overflow:hidden}
.solution-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.solution-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(59,130,246,.12);border-color:var(--accent)}
.solution-card h4{font-size:16px;margin-bottom:8px;color:var(--text)}
.solution-card p{font-size:13px;color:var(--text-dim);line-height:1.6}
.timeline{margin:24px 0;position:relative;padding-left:30px}
.timeline::before{content:'';position:absolute;left:11px;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,var(--accent),var(--accent2),var(--accent3))}
.timeline-item{position:relative;margin-bottom:24px}
.timeline-item::before{content:'';position:absolute;left:-23px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid var(--accent);background:var(--bg)}
.timeline-item:nth-child(2)::before{border-color:var(--accent2)}
.timeline-item:nth-child(3)::before{border-color:var(--accent3)}
.timeline-item h4{font-size:14px;margin-bottom:4px}
.timeline-item p{font-size:13px;color:var(--text-dim)}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin:24px 0}
.metric-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;text-align:center}
.metric-card .metric-value{font-size:28px;font-weight:700;color:var(--accent);margin-bottom:4px}
.metric-card .metric-label{font-size:12px;color:var(--text-dim)}
.section-title{font-size:18px;font-weight:600;margin:24px 0 12px;padding-left:12px;border-left:3px solid var(--accent)}
.stars{color:var(--warning);letter-spacing:2px}
.radar-container{display:flex;justify-content:center;padding:20px}
canvas{max-width:100%}
@media(max-width:768px){.sidebar{width:100%;height:auto;position:relative;border-right:none;border-bottom:1px solid var(--border)}.main{margin-left:0;max-width:100%;padding:20px}.app{flex-direction:column}}
.links-bar{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.link-btn{padding:8px 16px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--text-dim);text-decoration:none;font-size:13px;transition:all .3s}
.link-btn:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>
<div class="app">
<nav class="sidebar">
<h1>🏢 AI科技园区<br>企业数字化与AI升级方案</h1>
<div class="nav-item nav-overview active" onclick="showOverview()">
<span class="dot" style="background:linear-gradient(135deg,var(--accent),var(--accent2))"></span>
📊 总览仪表盘
</div>
<div id="nav-list"></div>
</nav>
<main class="main">
<div class="links-bar">
<a href="industry-report.html" class="link-btn" target="_blank">📈 行业分析报告</a>
<a href="solution.html" class="link-btn" target="_blank">💡 升级解决方案</a>
</div>
<div id="overview" class="enterprise-view active">
<div class="header-section">
<h2>📊 11家企业数字化成熟度总览</h2>
<p style="color:var(--text-dim);margin-top:8px">基于业务属性、管理风格与数字化现状的综合评估</p>
</div>
<div class="overview-grid">
<div class="stat-card"><h3>覆盖行业</h3><div class="value">9大</div></div>
<div class="stat-card"><h3>企业总数</h3><div class="value">11家</div></div>
<div class="stat-card"><h3>平均数字化水平</h3><div class="value">3.0</div></div>
<div class="stat-card"><h3>AI升级方案</h3><div class="value">33项</div></div>
</div>
<div class="chart-container">
<div class="chart-title">🏆 数字化成熟度排名</div>
<div class="bar-chart" id="barChart"></div>
</div>
<div class="chart-container">
<div class="chart-title">🎯 行业AI前景评级对比</div>
<div class="bar-chart" id="aiChart"></div>
</div>
</div>
<div id="detail-container"></div>
</main>
</div>
<script>
const enterprises = [
  {name:"纳金控股",industry:"供应链管理",level:3,color:"#3b82f6",solutions:[{title:"AI智能调度引擎",desc:"基于强化学习的动态路径规划与运力匹配，实时融合订单密度、路况预测等多维变量"},{title:"供应链金融风控模型",desc:"AI需求预测与货物流转数据交叉验证，构建动态信用评估体系"},{title:"需求预测系统",desc:"提前48-72小时预判区域货量峰值，自动触发运力储备策略"}],phases:["数据整合与系统对接","AI调度引擎上线","供应链金融协同"],metrics:[{value:"30%",label:"调度效率提升"},{value:"15%",label:"物流成本降低"},{value:"48h",label:"需求预测窗口"}]},
  {name:"蓝链集团",industry:"冷链供应链",level:3,color:"#06b6d4",solutions:[{title:"AI动态温控优化",desc:"根据货物热特性、车厢保温性能实时计算制冷功率，降低10-15%能耗"},{title:"区块链溯源体系",desc:"车载AI摄像头+自动化扫码，关键节点自动数据采集与上链存证"},{title:"冷链大数据平台",desc:"全生命周期追溯视图，温度曲线、地理位置、操作记录透明化展示"}],phases:["温控AI试点验证","溯源体系上链","全链路智能管控"],metrics:[{value:"15%",label:"制冷能耗降低"},{value:"99.9%",label:"温控合规率"},{value:"100%",label:"溯源覆盖率"}]},
  {name:"康储科技",industry:"细胞培养基",level:2,color:"#8b5cf6",solutions:[{title:"AI配方优化",desc:"机器学习辅助培养基配方筛选，高通量实验数据建模加速研发"},{title:"智能制造质控",desc:"AI视觉检测+过程参数实时监控，确保批次一致性"},{title:"研发数据管理平台",desc:"结构化研发数据资产管理，支撑知识复用与合规审计"}],phases:["数据标准化与采集","AI辅助研发平台","智能化产线建设"],metrics:[{value:"40%",label:"研发周期缩短"},{value:"99.5%",label:"批次合格率"},{value:"3x",label:"配方筛选效率"}]},
  {name:"粤芯半导体",industry:"晶圆代工",level:5,color:"#ef4444",solutions:[{title:"AI良率预测系统",desc:"多维工艺参数实时分析，提前预警良率偏移趋势"},{title:"设备预测性维护",desc:"基于振动/温度/电流信号的故障模式识别与维护调度"},{title:"数字孪生生产线",desc:"虚拟产线仿真优化，新工艺导入前预验证"}],phases:["AI模型深化迭代","全面预测性维护","自主优化闭环"],metrics:[{value:"97%+",label:"产品良率"},{value:"25%",label:"非计划停机减少"},{value:"20%",label:"新工艺导入提速"}]},
  {name:"伟顺钢铁",industry:"钢铁贸易",level:1,color:"#f59e0b",solutions:[{title:"电商平台搭建",desc:"线上交易+库存可视化+物流跟踪一体化平台"},{title:"AI价格预测",desc:"基于宏观经济、供需关系、期货数据的钢材价格走势预测"},{title:"数字化供应链金融",desc:"基于交易数据和库存质押的智能授信与风控"}],phases:["业务在线化转型","数据积累与分析","AI赋能决策"],metrics:[{value:"50%",label:"交易效率提升"},{value:"20%",label:"库存周转加速"},{value:"30%",label:"获客成本降低"}]},
  {name:"飞特建设",industry:"工厂维保",level:2,color:"#10b981",solutions:[{title:"BIM+AI碰撞检测",desc:"设计方案自动审查，提前发现管线冲突与施工风险"},{title:"智能工单调度",desc:"基于技能匹配、地理位置、紧急程度的AI派工系统"},{title:"AR远程维保指导",desc:"专家远程标注+AI辅助诊断，降低现场服务依赖"}],phases:["BIM技术普及","AI辅助设计与调度","AR远程维保落地"],metrics:[{value:"35%",label:"设计返工减少"},{value:"40%",label:"响应时间缩短"},{value:"25%",label:"差旅成本降低"}]},
  {name:"中恩工程",industry:"市政设计",level:3,color:"#ec4899",solutions:[{title:"AI辅助设计方案",desc:"基于规范知识库的方案自动生成与合规性检查"},{title:"CIM城市信息模型",desc:"多源数据融合的城市级数字底座，支撑智慧城市规划"},{title:"智能造价估算",desc:"历史项目数据挖掘+AI快速估价，精度达±5%以内"}],phases:["BIM深化应用","AI设计助手上线","CIM平台建设"],metrics:[{value:"30%",label:"设计效率提升"},{value:"±5%",label:"造价估算精度"},{value:"50%",label:"审图时间缩短"}]},
  {name:"大湾冷链",industry:"冷链仓储",level:2,color:"#14b8a6",solutions:[{title:"IoT温控监测",desc:"低成本传感器全覆盖，全程温度可视化消除盲区"},{title:"智能路径规划",desc:"成熟API集成，解决人工调度效率低下问题"},{title:"冷链溯源平台",desc:"从产地到终端的全链路追溯，支撑食品安全合规"}],phases:["基础数字化补课","智能温控与路径优化","一体化平台建设"],metrics:[{value:"60%",label:"调度效率提升"},{value:"100%",label:"温控可视化"},{value:"90%",label:"数据在线率"}]},
  {name:"华德工业",industry:"蒸发冷却空调",level:4,color:"#6366f1",solutions:[{title:"AI-Cooling云平台升级",desc:"多能源耦合智能控制，太阳能+市电动态切换优化"},{title:"数字孪生系统",desc:"设备全生命周期数字镜像，支撑远程调试与售后"},{title:"预测性维护服务",desc:"基于运行数据的故障预警，变被动维修为主动保养"}],phases:["平台功能迭代","多能源联控上线","数字孪生全面部署"],metrics:[{value:"20%",label:"综合能效提升"},{value:"30%",label:"售后成本降低"},{value:"95%",label:"设备可用率"}]},
  {name:"朗圣药业",industry:"生殖健康药物",level:3,color:"#f43f5e",solutions:[{title:"AI药物发现",desc:"靶点预测+分子生成+ADMET评估，加速先导化合物筛选"},{title:"临床试验优化",desc:"AI患者招募+自适应试验设计，缩短临床周期"},{title:"精准营销平台",desc:"用户画像+渠道效果归因，提升OTC/电商渠道ROI"}],phases:["数据治理与合规","AI研发辅助平台","精准营销体系"],metrics:[{value:"35%",label:"研发周期缩短"},{value:"25%",label:"临床成本降低"},{value:"40%",label:"营销ROI提升"}]},
  {name:"银迅信息",industry:"金融科技",level:4,color:"#0ea5e9",solutions:[{title:"AI商户经营分析",desc:"交易数据挖掘+经营健康度评分，赋能商户数字化经营"},{title:"智能风控反欺诈",desc:"实时交易监控+异常模式识别，毫秒级风险拦截"},{title:"个性化推荐引擎",desc:"基于用户行为的金融产品精准推荐，提升转化率"}],phases:["算法模型升级","场景生态拓展","开放平台构建"],metrics:[{value:"99.5%",label:"欺诈识别率"},{value:"3x",label:"商户活跃度提升"},{value:"45%",label:"产品转化提升"}]}
];

// Build nav
const navList = document.getElementById('nav-list');
enterprises.forEach((e,i) => {
  const div = document.createElement('div');
  div.className = 'nav-item';
  div.innerHTML = `<span class="dot" style="background:${e.color}"></span>${e.name}`;
  div.onclick = () => showEnterprise(i);
  navList.appendChild(div);
});

// Build bar charts
function buildBarChart(containerId, dataKey, maxVal) {
  const container = document.getElementById(containerId);
  const sorted = [...enterprises].sort((a,b) => b[dataKey] - a[dataKey]);
  sorted.forEach(e => {
    const pct = (e[dataKey] / maxVal * 100);
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `<div class="bar-label">${e.name}</div><div class="bar-track"><div class="bar-fill" style="width:0%;background:linear-gradient(90deg,${e.color},${e.color}88)" data-width="${pct}%">${e[dataKey]}/5</div></div>`;
    container.appendChild(row);
  });
  setTimeout(() => {
    container.querySelectorAll('.bar-fill').forEach(el => { el.style.width = el.dataset.width; });
  }, 300);
}

buildBarChart('barChart', 'level', 5);
const aiLevels = {"纳金控股":5,"蓝链集团":5,"康储科技":4,"粤芯半导体":5,"伟顺钢铁":3,"飞特建设":4,"中恩工程":4,"大湾冷链":4,"华德工业":5,"朗圣药业":4,"银迅信息":5};
enterprises.forEach(e => e.aiLevel = aiLevels[e.name] || 3);
buildBarChart('aiChart', 'aiLevel', 5);

function showOverview() {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelector('.nav-overview').classList.add('active');
  document.getElementById('overview').classList.add('active');
  document.getElementById('detail-container').innerHTML = '';
}

function showEnterprise(idx) {
  const e = enterprises[idx];
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.nav-item')[idx+1].classList.add('active');
  document.getElementById('overview').classList.remove('active');
  
  const stars = '★'.repeat(e.level) + '☆'.repeat(5-e.level);
  let html = `<div class="enterprise-view active">
    <div class="header-section">
      <h2>${e.name}</h2>
      <span class="tag tag-industry">${e.industry}</span>
      <span class="tag tag-level">数字化水平 <span class="stars">${stars}</span></span>
    </div>
    <div class="section-title">🚀 AI升级核心方案</div>
    <div class="solutions-grid">`;
  e.solutions.forEach(s => {
    html += `<div class="solution-card"><h4>${s.title}</h4><p>${s.desc}</p></div>`;
  });
  html += `</div>
    <div class="section-title">📅 实施路径</div>
    <div class="timeline">`;
  const phaseLabels = ["第一阶段：筑基期","第二阶段：成长期","第三阶段：成熟期"];
  e.phases.forEach((p,i) => {
    html += `<div class="timeline-item"><h4>${phaseLabels[i]}</h4><p>${p}</p></div>`;
  });
  html += `</div>
    <div class="section-title">📈 预期效果指标</div>
    <div class="metrics-grid">`;
  e.metrics.forEach(m => {
    html += `<div class="metric-card"><div class="metric-value">${m.value}</div><div class="metric-label">${m.label}</div></div>`;
  });
  html += `</div></div>`;
  document.getElementById('detail-container').innerHTML = html;
}
</script>
</body>
</html>
